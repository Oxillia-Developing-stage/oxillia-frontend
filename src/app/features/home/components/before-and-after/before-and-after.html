<main class="h-[100vh]">
  <section class="categories-section flex flex-col space-y-2 items-center mt-16">
    <h4 class="heading">Before & After</h4>
    <p class="text-cbase text-csecondary mb-10">Follow each skin journey and the result, with the exact products in every case.</p>

    <div class="w-full mt-10 px-4">
      <!-- SWIPER CONTAINER -->
      <swiper-container 
        #beforeandAfter
        class="beforeandAfter"
        slides-per-view="1"
        centered-slides="true"
        pagination="true"
        pagination-clickable="true"
        [init]="false"
      >
        <swiper-slide *ngFor="let person of people; let i = index">
          <div class="card p-3 flex flex-col items-center rounded-xl justify-center bg-[var(--color-bg-primary)] h-auto">
            <div class="mb-2 w-[50%] p-1">
              <div class="flex space-x-11 rounded-lg">
                <img [src]="person.before_url" class="rounded-lg object-fill w-1/2 transform -rotate-6" />
                <img [src]="person.after_url" class="rounded-lg object-fill mt-4 w-1/2 rotate-6" />
              </div>
              <p class="text-csecondry text-cxs w-full text-center mt-4">{{person.name}}</p>
            </div>
          </div>
        </swiper-slide>
      </swiper-container>

 <div class="nav-control-wrapper">
    <button (click)="slidePrev()" class="nav-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </button>

    <!-- 
       We don't need a div here anymore because the 
       dots are floating absolutely into this space 
    -->

    <button (click)="slideNext()" class="nav-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6" />
      </svg>
    </button>
  </div>
    </div>
  </section>
</main>
