<nav class="w-full flex justify-between items-center bg-[var(--color-bg-primary)] lg:px-[40px] px-[20px]  py-[20px]">
    <ul class="hidden  md:flex space-x-7 p-4 text-[var(--color-text-secondary)] justify-start flex-1">
        <li><a routerLink="main/home" routerLinkActive="active" class="nav-link" [routerLinkActiveOptions]="{exact:true}" >Home</a></li>
        <li><a routerLink="main/shop" routerLinkActive="active" class="nav-link" >shop</a></li>
        <li><a routerLink="/main/products" class="nav-link">Categories</a></li>
        <li><a href="#" class="nav-link">Docs</a></li>
    </ul>
    <ox-icon name="ox-mobile-menu"  class="md:hidden "  [size]="30" (click)="toggleMobileMenu()"></ox-icon>
    <div class="md:flex-1 flex justify-center items-center">
        <ox-icon name="ox-logo-wordmark" [size]="132" class="hidden md:inline-flex"></ox-icon>
        <span class="md:hidden">
            <ox-icon name="ox-mobile-logo" [size]="132" class="inline-flex justify-center items-center md:hidden"></ox-icon>
        </span>

</div>
<div class="flex md:flex-1 justify-end">
    <a class="cart-icon-wrap relative" routerLink="/main/cart" aria-label="Open cart">
        <ox-icon name="ox-shopping-basket" class="flex justify-center items-center" [size]="24"></ox-icon>
        <span *ngIf="cartCount() > 0" class="cart-badge">{{ cartCount() }}</span>
    </a>
    <app-navbar-account-dropdown
      class="ml-4"
      [isAuthenticated]="isAuthenticated()"
      [accountLabel]="accountLabel()"
      [accountRoute]="accountRoute()"
    ></app-navbar-account-dropdown>
</div>
</nav>

<nav class="w-full flex flex-col md:flex-row justify-between items-center bg-[var(--color-bg-primary)] lg:px-[40px] px-[20px]  py-[20px] lg:space-x-14 lg:space-y-0 space-y-3">
    <div class="flex-1 flex space-x-4 justify-center items-center">
        <span class=" text-[var(--color-icon-secondary)]">
        <ox-icon name="ox-truck" [size]="32" class="text-[var(--color-icon-secondary)]" color="var(--color-icon-secondary)" ></ox-icon>

        </span>
        <div class="flex flex-col justify-around">
            <span class="text-cbase text-[var(--color-text-primary)]">Free Shipping over 50$+ Orders</span>
            <span class="text-cxs text-[var(--color-text-secondary)]">Limited-Time Offer</span>
            </div>
    </div>
    <div class="flex-1 search-input">
            <ox-icon name="ox-search"  class="search-icon"  [size]="17"></ox-icon>

        <input type="text" placeholder="Search for ..." class="form-input pl-10"/>
    </div>
    <div class="flex-1 flex w-full md:w-auto">
       <div class="flex flex-1 items-center space-x-3 justify-center md:justify-start cursor-pointer">
            <ox-icon name="ox-flag-uk" [size]="32"></ox-icon>

            <div class="flex flex-col">
                <span class="text-cbase text-[var(--color-text-primary)]">Language</span>
                <span class="text-cxs text-[var(--color-text-secondary)]">English</span>
            </div>
        </div>
        <div class="flex flex-1 items-center space-x-3  justify-center  md:justify-end cursor-pointer">
                <ox-icon name="ox-moon" [size]="32" color="var(--color-icon-secondary)"></ox-icon>

            <div class="flex flex-col" (click)="toggleTheme()">
                <span class="text-cbase text-[var(--color-text-primary)]">Change Theme</span>
                <span class="text-cxs text-[var(--color-text-secondary)]">{{currentTheme}}</span>
            </div>
        </div>
    </div>
</nav>






<!-- mobile -->
<div class="fixed inset-0 bg-black/40 z-40 transition-opacity duration-300" [class.opacity-100]="isMobileMenuOpen()" [class.opacity-0]="!isMobileMenuOpen()" [class.pointer-events-none]="!isMobileMenuOpen()" (click)="toggleMobileMenu()">
<!-- pane; -->
<div class="fixed top-0 left-0 w-3/4 h-full bg-[var(--color-bg-primary)] z-50 p-6 flex flex-col space-y-6 transform transition-transform duration-300 ease-out overflow-auto" [class.translate-x-0]="isMobileMenuOpen()" [class.-translate-x-full]="!isMobileMenuOpen()" (click)="$event.stopPropagation()">
        <div class="flex justify-between items-center mb-6">
            <ox-icon name="ox-logo-wordmark" [size]="132" class="inline-flex"></ox-icon>
            <ox-icon name="ox-close" [size]="30" (click)="toggleMobileMenu()" class="cursor-pointer"></ox-icon>
        </div>

            <ul class="flex flex-col space-y-4 text-[var(--color-text-secondary)]">
        <li *ngFor="let item of menuItems; let i = index">
            <a *ngIf="item.route" [routerLink]="item.route" routerLinkActive="active" class="nav-link block" (click)="toggleMobileMenu()">{{item.label}}</a>
            <div *ngIf="item.type === 'categories'">
                <div class="flex justify-center items-center cursor-pointer" (click)="toggleCategory(i)">
                    <span class="nav-link block">{{item.label}}</span>
                    <ox-icon name="ox-chevron-down" [size]="20" [class.rotate-180]="openCategoryIndex === i"></ox-icon>
                </div>
                <ul *ngIf="openCategoryIndex === i" class="mt-2 pl-4 border-l border-[var(--color-border)]">
                    <li *ngFor="let category of categories" class="mt-2">
                        <a
                            [routerLink]="['/main/products']"
                            [queryParams]="{ category: category.name }"
                            class="font-semibold text-[var(--color-text-primary)] hover:text-[var(--color-text-primary)]"
                        >
                            {{category.name}}
                        </a>
                        <ul class="mt-1 pl-4">
                            <li *ngFor="let sub of category.children" class="mt-1">
                                <a
                                    [routerLink]="['/main/products']"
                                    [queryParams]="{ category: category.name, subCategory: sub }"
                                    class="nav-link block"
                                    (click)="toggleMobileMenu()"
                                >
                                    {{sub}}
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </li>
    </ul>
    </div>

</div>
