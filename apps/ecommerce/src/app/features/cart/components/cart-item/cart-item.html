<article class="cart-item-card">
	<div class="cart-item-image">
		<img
			class="cart-item-image-img"
			[src]="item.product.images?.[0] || ''"
			[alt]="item.product.name"
		/>
	</div>

	<div class="cart-item-body">
		<p class="text-cxs text-csecondary">Age Defense</p>
		<h3 class="text-clg text-cprimary">{{ item.product.name }}</h3>
		<p class="price text-cbase text-cprimary">$ {{ item.price }}</p>
		<p class="text-cxs text-csecondary">Free delivery tomorrow at 5 DEC</p>

		<div class="cart-controls">
			<button class="qty-btn" (click)="dec()">-</button>
			<span class="qty">{{ item.quantity }}</span>
			<button class="qty-btn" (click)="inc()">+</button>
		</div>
	</div>

	<div class="cart-item-actions">
		<button class="remove-btn" (click)="remove()" aria-label="Remove item">
			<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
				<path d="M3.87 17.02L2.67 9.84C2.49 8.75 2.4 8.21 2.69 7.86C2.98 7.5 3.51 7.5 4.59 7.5H19.41C20.49 7.5 21.02 7.5 21.31 7.86C21.6 8.21 21.51 8.75 21.33 9.84L20.13 17.02C19.73 19.4 19.53 20.59 18.71 21.29C17.9 22 16.73 22 14.38 22H9.62C7.27 22 6.1 22 5.29 21.29C4.47 20.59 4.27 19.4 3.87 17.02Z" stroke="currentColor" stroke-width="1.5"/>
				<path d="M17.5 7.5C17.5 4.46 15.04 2 12 2C8.96 2 6.5 4.46 6.5 7.5" stroke="currentColor" stroke-width="1.5"/>
			</svg>
		</button>
	</div>
</article>
