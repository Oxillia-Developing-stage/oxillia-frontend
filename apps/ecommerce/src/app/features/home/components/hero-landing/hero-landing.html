

<section class="hero relative mt-0 md:mt-0 min-h-[110vh] flex flex-col overflow-hidden">


  <div class="hero__container flex flex-col relative flex-1">
    <!-- TEXT SECTION - Top Center -->
    <div class="hero-bg">
      <div class="hero__content text-center relative z-10 mb-5">

        <h1 class="heading md:hidden">
          Oxillia is the store which combines
          <span class="">Trust and Convenience</span>
        </h1>

        <h1 class="hidden heading md:block">
          Oxillia is the store which combines
          <span class="hidden md:text-cbase md:block">Trust and Convenience</span>
        </h1>

        <p class="text-cxs">
          We show you ingredients, real before/after results, and step-by-step usage so every
          purchase is informed.
        </p>
      </div>

      <!-- VISUAL SECTION - Overlaps with text, uses grid -->
      <div class="hero__visual grid grid-cols-12 grid-rows-10 relative -mt-14 md:-mt-24 z-0 flex-1">
        <!-- Left Image - Starts at row 4 (lower) -->
        <div class="hero__left-img col-span-2 col-start-1 row-end-11 row-span-4 relative z-10">
          <div
            class="bg-[var(--color-button-primary)] scoop-icon-container"
          >
          <ox-icon name="ox-arrow-up-right" [size]="26" color="white"></ox-icon>
            <!-- icon -->
          </div>
          <img
            src="/assests/pictures/landing-page/hero-left.png"
            alt="Product showcase"
            class="product-left w-full object-contain absolute -right-2 top-1"
          />
          <svg width="0" height="0" style="position:absolute;">
  <defs>
    <clipPath id="complexScoop" clipPathUnits="objectBoundingBox">
      <path d="
        M 0.1, 0           
        H 0.9              
        A 0.1, 0.1 0 0 1 1, 0.1 
        V 0.65 
        A 0.126, 0.1 0 0 1 0.9, 0.75            
        A 0.25, 0.25 0 0 0 0.75, 0.9
        A 0.136, 0.1 0 0 1 0.65, 1 
        H 0.1
        A 0.1, 0.1 0 0 1 0, 0.9  
        V 0.1              
        A 0.1, 0.1 0 0 1 0.1, 0  
        Z" />
    </clipPath>
  </defs>
</svg>
        </div>

        <!-- Center Main Image (largest) - Starts at row 1 -->
        <div
          class="hero__main-img col-span-8 col-start-3 row-end-11 row-span-10 relative z-10 transform -translate-y-5 md:-translate-y-10"
        >
          <img
            src="/assests/pictures/landing-page/hero-main.png"
            alt="Main product"
            class="product-main w-full object-contain -mt-3"
          />
        </div>

        <!-- Right Image - Starts at row 4 (lower) -->
        <div class="hero__right-img col-span-2 col-start-11 row-end-11 row-span-4 relative z-10">
          <div class="bg-[var(--color-button-primary)]  scoop-icon-container">
            <ox-icon name="ox-shield-security" [size]="26" color="white"></ox-icon>
          </div>
          <img
            src="/assests/pictures/landing-page/hero-right.png"
            alt="Product showcase"
            class="product-right w-full right-2 top-1 absolute object-contain"
          />
          <svg width="0" height="0" style="position:absolute;">
  <defs>
    <clipPath id="topRightSmoothScoop" clipPathUnits="objectBoundingBox">
      <path d="
          M 0.3, 0 
        
          H 0.9 
        A 0.1, 0.1 0 0 1 1, 0.1 
        
         V 0.9 
        A 0.1, 0.1 0 0 1 0.9, 1 
        
         H 0.1 
        A 0.1, 0.1 0 0 1 0, 0.9 
        
        V 0.4 
      A 0.05, 0.05 0 0 1 0.05, 0.35
        A 0.4, 0.4 0 0 0 0.25, 0.05 
      A 0.1, 0.05 0 0 1 0.4, 0
        Z" />
    </clipPath>
  </defs>
</svg>
        </div>
      </div>
    </div>

    <!-- Buttons - Below visual section -->
    <div class="hero__actions flex gap-4 justify-center mt-1 pb-8 relative z-10">
      <button class="btn btn-cta-primary">Start shopping</button>
      <button class="btn btn-cta-secondary">Contact us</button>
    </div>
  </div>
</section>
