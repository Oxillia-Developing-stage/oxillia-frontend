<div class="flex h-full flex-col gap-4">
  <div
    class="flex flex-wrap gap-2 rounded-[2rem] bg-[var(--color-bg-primary)] p-2"
    role="tablist"
  >
    @for (tab of tabs; track tab.id) {
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="activeTab() === tab.id"
        (click)="setTab(tab.id)"
        class="rounded-[1.5rem] px-5 py-2.5 text-csm font-medium transition-colors"
        [class.bg-[var(--color-bg-card)]]="activeTab() === tab.id"
        [class.text-cprimary]="activeTab() === tab.id"
        [class.shadow-sm]="activeTab() === tab.id"
        [class.text-csecondary]="activeTab() !== tab.id"
      >
        {{ tab.label }}
      </button>
    }
  </div>

  <div
    class="flex-1 rounded-[2rem] bg-[var(--color-bg-card)] p-6 md:p-8"
    role="tabpanel"
  >
    @if (activeContent().intro) {
      <p class="mb-5 text-cbase leading-relaxed text-csecondary">{{ activeContent().intro }}</p>
    }

    @if (activeContent().bullets.length) {
      <ul class="space-y-3">
        @for (item of activeContent().bullets; track item) {
          <li class="flex items-start gap-3 text-cbase text-cprimary">
            <span
              class="mt-0.5 flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-[var(--color-button-primary)] text-[var(--color-icon-on-color)]"
            >
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <path
                  d="M2.5 6L5 8.5L9.5 3.5"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <span>{{ item }}</span>
          </li>
        }
      </ul>
    }
  </div>
</div>
