<div class="forget-wrap h-screen">


	<section class="forget-card">
		<div class="icon-wrap w-full h-20 rounded-tl-lg rounded-tr-lg bg-primary flex items-center justify-center">
			<lucide-icon name="lock"></lucide-icon>

		</div>
		<h2 class="title">Reset Your Password</h2>
		<p class="subtitle">Enter your email address and we will send you instructions to reset your password.</p>

		@if (isSuccess) {
			<div class="success-box">
				<p>A reset link has been sent to your email.</p>
				<a [routerLink]="'/auth/resetpassword'" [queryParams]="{ email: forgetPasswordForm.getRawValue().email }">I already have a token</a>
			</div>
		}

		<form [formGroup]="forgetPasswordForm" (ngSubmit)="onSubmit()" class="form-body">
			<app-form-input
				[id]="'email'"
				[label]="'Email Address'"
				[type]="'email'"
				placeholder="Example@example.com"
				formControlName="email"
			/>

			<button
				pButton
				type="submit"
				label="Send Reset Link"
				class="btn btn-cta-primary w-full"
				[loading]="isLoading"
				[disabled]="isLoading"
			></button>
		</form>

		<a routerLink="/auth/login" class="back-link">Back to Login</a>
	</section>
</div>
