<div class="reset-wrap">
  <section class="reset-card">
    <div class="lock-icon" aria-hidden="true">&#128274;</div>
    <h2 class="title">Create New Password</h2>
    <p class="subtitle">Use the token from your email and set a secure new password.</p>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="form-body">
      <app-form-input
        [id]="'email'"
        [label]="'Email Address'"
        [type]="'email'"
        placeholder="Example@example.com"
        formControlName="email"
      />

      <app-form-input
        [id]="'token'"
        [label]="'Reset Token'"
        [type]="'text'"
        placeholder="Paste token from email"
        formControlName="token"
      />

      <app-form-input
        [id]="'newPassword'"
        [label]="'New Password'"
        [type]="'password'"
        placeholder="Min. 8 characters"
        formControlName="newPassword"
      />

      <app-form-input
        [id]="'confirmPassword'"
        [label]="'Confirm Password'"
        [type]="'password'"
        placeholder="Retype your new password"
        formControlName="confirmPassword"
      />

      <button
        pButton
        type="submit"
        label="Reset Password"
        class="btn btn-cta-primary w-full"
        [loading]="isLoading"
        [disabled]="isLoading"
      ></button>
    </form>

    <a routerLink="/auth/login" class="back-link">Back to Login</a>
  </section>
</div>
