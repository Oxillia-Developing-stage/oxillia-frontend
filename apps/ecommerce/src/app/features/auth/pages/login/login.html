<div class="h-screen w-full bg-[var(--color-bg-card)] px-8 py-12 flex flex-col  ">
	<div class="text-center">
		<h2 class="heading regular">Welcome Back</h2>
		<p class="text-secondary regular">Happy to see you again</p>
	</div>

		<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex-1 flex flex-col gap-3 justify-center">
			<app-form-input
			[id]="'email'"
			[label]="'Email Address'"
			[type]="'email'"
			formControlName="email"
			placeholder="Example@example.com"
			/>

			<app-form-input
			[id]="'password'"
			[label]="'Password'"
			[type]="'password'"
			formControlName="password"
			placeholder="Min. 8 characters"
			/>
			<p class="text-sm text-[var(--color-button-primary)] w-full flex justify-end">
				<a routerLink="/auth/forget-password">Forgot  password? </a>
			</p>
			<!-- <p-button type="submit" label="Login" class="btn btn-cta-primary w-full" [loading]="isLoading" [disabled]="isLoading"></p-button> -->
			<button pButton type="submit"  label="Login" class="btn btn-cta-primary w-full"
			[loading]="isLoading"
			[disabled]="isLoading">
			</button>

			<div class="flex items-center my-2 w-full">
				<div class="flex-grow border-t border-gray-300"></div>
				<span class="mx-4 text-secondary text-sm">or</span>
				<div class="flex-grow border-t border-gray-300"></div>
			</div>

			<button pButton type="button" class="w-full flex justify-center items-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[var(--color-button-primary)] transition-colors" (click)="loginWithGoogle()">
				<svg class="h-5 w-5 mr-2" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
					<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
					<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
					<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
				</svg>
				Continue with Google
			</button>

			<p class="text-sm text-secondary w-full flex justify-center mt-2">
				Don't have an account? <a class="text-[var(--color-button-primary)] ml-1" routerLink="/auth/signup">Sign Up</a>
			</p>
		</form>
	
</div>
