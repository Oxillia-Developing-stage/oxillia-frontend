<div class="mb-4">
    <label class="text-csm regular block mb-2   text-start" for="{{id()}}">{{label()}}</label>
    <input [id]="id()"
   class="form-input bg-[var(--color-bg-primary)] w-full text-[var(--color-text-secondary)] text-csm regular py-2 px-1 rounded-lg"
    pInputText
    [type]="type()"
    [placeholder]="placeholder()"
    [(ngModel)]="value"
    (ngModelChange)="handleValueChange($event)"
    (blur)="onBlur()"
    [invalid]="isInvalid()"
    [disabled]="disabled"
     >
     @if(isInvalid()) {
        <p-message severity="error" variant="simple" size="small" [text]="errorMessage() || (controlDir?.control?.errors | inputErrorMessage: label())"/>
     }

</div>
